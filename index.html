        <style>
            * {

            body {

                height: 100vh;
                width: 100vw;

                display: flex;
                align-items: center;

            }

                position: fixed;
                inset: 0;
                z-index: 0;
            }

                z-index: 2;

            }

                background: linear-gradient(
                    110deg,
                    #00e5ff 0%,
                    #7b6fff 50%,
                    #ff6fd8 100%
                );

                -webkit-text-fill-color: transparent;
                background-clip: text;
                position: relative;
                animation: hueshift 8s ease-in-out infinite;
            }

                content: attr(data-t);
                position: absolute;
                inset: 0;
                background: inherit;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                filter: blur(32px);
                opacity: 0.35;
                animation: flare 5s ease-in-out infinite;
            }

        <canvas id="c"></canvas>

        <div class="wrap">
            <div class="eyebrow">signal · 00:00:00</div>

            <h1>
                <span class="ghost">ты ещё</span>
                <span class="ghost">не знаешь</span>
                <span class="ishu" data-t="ISHU">AISHU</span>
            </h1>

            <p class="sub">Она уже в сети.<br />Осталось сделать шаг.</p>

            <a class="btn" href="https://clixtream.com/click?lp=1">
                <span class="btn-line"></span>
                <span>Познакомиться</span>
                <span class="btn-circle">→</span>
            </a>

        </div>

        <script>
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            let W, H;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const stars = Array.from({ length: 200 }, () => ({
                x: Math.random() * 1000,
                y: Math.random() * 1000,
                r: Math.random() * 1.4 + 0.2,
                o: Math.random() * 0.55 + 0.06,
                vx: (Math.random() - 0.5) * 0.05,
                vy: (Math.random() - 0.5) * 0.05,
                phase: Math.random() * Math.PI * 2,
                freq: Math.random() * 0.009 + 0.003,
                hue:
                    Math.random() > 0.85
                        ? `0,229,255`
                        : Math.random() > 0.5
                          ? `123,111,255`
                          : `220,220,255`,
            }));

            let t = 0;
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Туманность — синяя с фиолетовым
                const g1 = ctx.createRadialGradient(
                    W * 0.68,
                    H * 0.38,
                    0,
                    W * 0.68,
                    H * 0.38,
                    W * 0.52,
                );
                g1.addColorStop(0, 'rgba(90,60,255,0.09)');
                g1.addColorStop(0.5, 'rgba(0,180,255,0.04)');
                g1.addColorStop(1, 'transparent');
                ctx.fillStyle = g1;
                ctx.fillRect(0, 0, W, H);

                const g2 = ctx.createRadialGradient(
                    W * 0.18,
                    H * 0.65,
                    0,
                    W * 0.18,
                    H * 0.65,
                    W * 0.32,
                );
                g2.addColorStop(0, 'rgba(120,80,255,0.06)');
                g2.addColorStop(1, 'transparent');
                ctx.fillStyle = g2;
                ctx.fillRect(0, 0, W, H);

                t++;
                stars.forEach((s) => {
                    s.x += s.vx;
                    s.y += s.vy;
                    if (s.x < 0) s.x = 1000;
                    if (s.x > 1000) s.x = 0;
                    if (s.y < 0) s.y = 1000;
                    if (s.y > 1000) s.y = 0;
                    const flicker =
                        Math.sin(t * s.freq + s.phase) * 0.38 + 0.62;
                    ctx.beginPath();
                    ctx.arc(
                        (s.x / 1000) * W,
                        (s.y / 1000) * H,
                        s.r,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fillStyle = `rgba(${s.hue},${s.o * flicker})`;
                    ctx.fill();
                });

                requestAnimationFrame(draw);
            }
            draw();
        </script>
